            <h1 id="MongoDB"><a href="#MongoDB" class="headerlink" title="MongoDB"></a>MongoDB</h1><h2 id="MongoDB-1"><a href="#MongoDB-1" class="headerlink" title="MongoDB"></a>MongoDB</h2><h4 id="安装"><a href="#安装" class="headerlink" title="安装"></a>安装</h4><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 打开 Go modules</span></span><br><span class="line">go <span class="built_in">env</span> -w GO111MODULE=on</span><br><span class="line"><span class="comment"># 设置 GOPROXY</span></span><br><span class="line"><span class="comment"># go env -w GOPROXY=https://goproxy.io,direct</span></span><br><span class="line">go <span class="built_in">env</span> -w GOPROXY=https://goproxy.cn,direct</span><br><span class="line"></span><br><span class="line"><span class="comment"># 手动安装依赖</span></span><br><span class="line">go get -u -v github.com/mdempsky/gocode</span><br><span class="line">go get -u -v github.com/uudashr/gopkgs/v2/cmd/gopkgs</span><br><span class="line">go get -u -v github.com/ramya-rao-a/go-outline</span>< #x27;</span>: <span class="string">&#x27;IN&#x27;</span>, <span class="string">&#x27;value&#x27;</span>: <span class="string">&#x27;02&#x27;</span>, <span class="string">&#x27;not&#x27;</span>: <span class="literal">False</span>&#125;], <span class="string">&#x27;groupFields&#x27;</span>: <span class="literal">None</span>, <span class="string">&#x27;returnFields&#x27;</span>: <span class="string">&#x27;1,2,7,9,10,26,31,32,43,44&#x27;</span>, <span class="string">&#x27;sortFields&#x27;</span>: <span class="string">&#x27;s50:desc&#x27;</span>, <span class="string">&#x27;pageNum&#x27;</span>: <span class="number">4</span>, <span class="string">&#x27;pageSize&#x27;</span>: <span class="number">5</span>, <span class="string">&#x27;facetLimit&#x27;</span>: <span class="number">100</span>, <span class="string">&#x27;collection&#x27;</span>: <span class="string">&#x27;ZGCPWSW2&#x27;</span>, <span class="string">&#x27;hbaseTable&#x27;</span>: <span class="string">&#x27;ZGCPWSW2&#x27;</span>, <span class="string">&#x27;solrServiceType&#x27;</span>: <span class="number">0</span>&#125;, <span class="string">&#x27;queryResult&#x27;</span>: &#123;<span class="string">&#x27;resultCount&#x27;</span>: <span class="number">9992184</span>, <span class="string">&#x27;resultList&#x27;</span>: [&#123;<span class="string">&#x27;44&#x27;</span>: <span class="string">&#x27;&#x27;</span>, <span class="string">&#x27;1&#x27;</span>: <span class="string">&#x27;北京市高级人民法院决定书&#x27;</span>, <span class="string">&#x27;2&#x27;</span>: <span class="string">&#x27;最高人民法院&#x27;</span>, <span class="string">&#x27;26&#x27;</span>: <span class="string">&#x27;&#x27;</span>, <span class="string">&#x27;7&#x27;</span>: <span class="string">&#x27;（2022）最高法刑延7026号&#x27;</span>, <span class="string">&#x27;rowkey&#x27;</span>: <span class="string">&#x27;f39ec29bd62241ad8638ae51012a9565&#x27;</span>, <span class="string">&#x27;9&#x27;</span>: <span class="string">&#x27;0227&#x27;</span>, <span class="string">&#x27;3
