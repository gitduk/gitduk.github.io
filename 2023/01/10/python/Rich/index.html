ass="line"></span><br><span class="line">label_progress = Progress(</span><br><span class="line">    TimeElapsedColumn(),</span><br><span class="line">    TextColumn(<span class="string">&#x27;&#123;task.description&#125;&#x27;</span>),</span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment"># progress for a task step that takes a while, but we&#x27;re not sure how long</span></span><br><span class="line">step_progress_timed = Progress(</span><br><span class="line">    TextColumn(<span class="string">&#x27;  &#x27;</span>),</span><br><span class="line">    TimeElapsedColumn(),</span><br><span class="line">    TextColumn(<span class="string">&#x27;[bold purple]&#123;task.fields[action]&#125;&#x27;</span>),</span><br><span class="line">    SpinnerColumn(<span class="string">&#x27;simpleDots&#x27;</span>),</span><br><span class="line">)</span><br><span class="line"><span class="comment"># progress for a task step that has a known total target (steps, bytes, ...)</span></span><br><span class="line">step_progress = Progress(</span><br><span class="line">    TextColumn(<span class="string">&#x27;  &#x27;</span>),</span><br><span class="line">    TimeElapsedColumn(),</span><br><span class="line">    TextColumn(<span class="string">&#x27;[bold purple]&#123;task.fields[action]&#125;&#x27;</span>),</span><br><span class="line">    BarColumn(),</span><br><span class="line">    TextColumn(<span class="string">&#x27;(&#123;task.completed&#125;/&#123;task.total&#125;)&#x27;</span>),</span><br><span class="line">)</span><br><span class="line">download_progress = Progress(</span><br><span class="line">    TextColumn(<span class="string">&#x27;[bold yellow]   Downloading &#123;task.fields[filename]&#125;&#x27;</span>),</span><br><span class="line">    BarColumn(),</span><br><span class="line">    DownloadColumn(),</span><br><span class="line">    TransferSpeedColumn(),</span><br><span class="line">    TimeRemainingColumn(),</span><br><span class="line">)</span><br><span class="line"><span class="comment"># progress for a single tasks</span></span><br><span class="line">task_progress = Progress(</span><br><span class="line">    TextColumn(<span class="string">&#x27;[bold blue]Progress for &#123;task.fields[name]&#125;: &#123;task.percentage:.0f&#125;%&#x27;</span>),</span><br><span class="line">    BarColumn(),</span><br><span class="line">    TextColumn(<span class="string">&#x27;(&#123;task.completed&#125; of &#123;task.total&#125; steps done)&#x27;</span>),</span><br><span class="line">)</span><br><span class="line">overall_progress = Progress(</span><br><span class="line">    TimeElapsedColumn(),</span><br><span class="line">    BarColumn(),</span><br><span class="line">    TextColumn(<span class="string">&#x27;&#123;task.description&#125;&#x27;</span>)</span><br><span class="line">)</span><br><span class="line">group = RenderGroup(</span><br><span class="line">    label_progress,</span><br><span class="line">    step_progress_timed,</span><br><span class="line">    step_progress,</span><br><span class="line">    download_progress,</span><br><span class="line">    Rule(style=<span class="string">&#x27;#AAAAAA&#x27;</span>),</span><br><span class="line">    task_progress,</span><br><span class="line">    overall_progress</span><br><span class="line">)</span><br><span class="line">live = Live(group)</span><br><span class="line"></span><br><span class="line">apps = [</span><br><span class="line">    (<span class="string">&#x27;app 1&#x27;</span>, app1_urls, (<span class="number">2</span>, <span class="number">5</span>, <span class="number">3</span>)),</span><br><span class="line">    (<span class="string">&#x27;app 2&#x27;</span>, app2_urls, (<span class="number">5</span>, <span class="number">10</span>, <span class="number">6</span>)),</span><br><span class="line">    (<span class="string">&#x27;app 3&#x27;</span>, [], (<span class="number">1</span>, <span class="number">5</span>, <span class="number">3</span>)),</span><br><span class="line">]</span><br><span class="line">overall_task_id = overall_progress.add_task(<span class="string">&#x27;&#x27;</span>, total=<span class="built_in">len</span>(apps))</span><br><span class="line"><span class="keyword">with</span> live:</span><br><span class="line">    <span class="keyword">for</span> idx, (name, urls, step_times) <span class="keyword">in</span> <span class="built_in">enumerate</span>(apps):</span><br><span class="line">        overall_progress.update(overall_task_id, description=<span class="string">&#x27;[bold #AAAAAA](%d out of %d apps installed)&#x27;</span> % (idx, <span class="built_in">len</span>(apps)))</span><br><span class="line">        label_task_id = label_progress.add_task(<span class="string">&quot;installing %s&quot;</span> % name)</span><br><span class="line">        task_id = task_progress.add_task(<span class="string">&#x27;&#x27;</span>, total=<span class="number">4</span>, name=name)</span><br><span class="line">        download_task_id = step_progress.add_task(<span class="string">&#x27;&#x27;</span>, total=<span class="built_in">len</span>(urls), action=<span class="string">&#x27;Fetching sources&#x27;</span>, name=name)</span><br><span class="line">        <span class="keyword">for</span> (url, size_bytes) <span class="keyword">in</span> urls:</span><br><span class="line">            fake_download(url, size_bytes)</span><br><span class="line">            step_progress.update(download_task_id, advance=<span class="number">1</span>)</span><br><span class="line">        step_progress.update(download_task_id, visible=<span class="literal">False</span>)</span><br><span class="line">        task_progress.update(task_id, advance=<span class="number">1</span>)</span><br><span class="line">        run_steps(name, step_times, task_id)</span><br><span class="line">        task_progress.update(task_id, visible=<span class="literal">False</span>)</span><br><span class="line">        labe
