<span class="line">                <span class="string">&#x27;item&#x27;</span>: item,</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">spider_error</span>(<span class="params">self, failure, request, response, spider</span>):</span><br><span class="line">        <span class="string">&quot;&quot;&quot;Logs an error message from a spider.</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">        .. versionadded:: 2.0</span></span><br><span class="line"><span class="string">        &quot;&quot;&quot;</span></span><br><span class="line">        <span class="keyword">return</span> &#123;</span><br><span class="line">            <span class="string">&#x27;level&#x27;</span>: logging.ERROR,</span><br><span class="line">            <span class="string">&#x27;msg&#x27;</span>: SPIDERERRORMSG,</span><br><span class="line">            <span class="string">&#x27;args&#x27;</span>: &#123;</span><br><span class="line">                <span class="string">&#x27;request&#x27;</span>: request,</span><br><span class="line">                <span class="string">&#x27;referer&#x27;</span>: referer_str(request),</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">def</span> <span class="title function_">download_error</span>(<span class="params">self, failure, request, spider, errmsg=<span class="literal">None</span></span>):</span><br><span class="line">        <span class="string">&quot;&quot;&quot;Logs a download error message from a spider (typically coming from</span></span><br><span class="line"><span class="string">        the engine).</span></span><br><span class="line"><span class="string"></span></span><br><span class="line"><span class="string">        .. versionadded:: 2.0</span></span><br><span class="line"><span class="string">        &quot;&quot;&quot;</span></span><br><span class="line">        args = &#123;<span class="string">&#x27;request&#x27;</span>: request&#125;</span><br><span class="line">        <span class="keyword">if</span> errmsg:</span><br><span class="line">            msg = DOWNLOADERRORMSG_LONG</span><br><span class="line">            args[<span class="string">&#x27;errmsg&#x27;</span>] = errmsg</span><br><span class="line">        <span class="keyword">else</span>:</span><br><span class="line">            msg = DOWNLOADERRORMSG_SHORT</span><br><span class="line">        <span class="keyword">return</span> &#123;</span><br><span class="line">            <span class="string">&#x27;level&#x27;</span>: logging.ERROR,</span><br><span class="line">            <span class="string">&#x27;msg&#x27;</span>: msg,</span><br><span class="line">            <span class="string">&#x27;args&#x27;</span>: args,</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
