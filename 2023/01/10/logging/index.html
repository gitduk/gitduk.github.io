t;</span>: <span class="string">&quot;&#123;&quot;</span>,</span><br><span class="line">            <span class="string">&quot;datefmt&quot;</span>: <span class="string">&quot;%Y-%m-%d %H:%M:%S&quot;</span></span><br><span class="line">        &#125;,</span><br><span class="line">    &#125;,</span><br><span class="line">    <span class="string">&quot;handlers&quot;</span>: &#123;</span><br><span class="line">        <span class="string">&quot;console&quot;</span>: &#123;</span><br><span class="line">            <span class="string">&quot;level&quot;</span>: os.environ.get(<span class="string">&quot;LOG_LEVEL&quot;</span>, <span class="string">&quot;DEBUG&quot;</span>),</span><br><span class="line">            <span class="string">&quot;class&quot;</span>: <span class="string">&quot;logging.StreamHandler&quot;</span>,</span><br><span class="line">            <span class="string">&quot;formatter&quot;</span>: <span class="string">&quot;verbose&quot;</span>,</span><br><span class="line">        &#125;,</span><br><span class="line">        <span class="string">&quot;log_to_detail_file&quot;</span>: &#123;</span><br><span class="line">            <span class="string">&quot;class&quot;</span>: <span class="string">&quot;logging.handlers.RotatingFileHandler&quot;</span>,</span><br><span class="line">            <span class="string">&quot;level&quot;</span>: <span class="string">&quot;INFO&quot;</span>,</span><br><span class="line">            <span class="string">&quot;formatter&quot;</span>: <span class="string">&quot;verbose&quot;</span>,</span><br><span class="line">            <span class="string">&quot;filename&quot;</span>: LOG_DIR / <span class="string">&quot;register.log&quot;</span>,</span><br><span class="line">            <span class="string">&quot;mode&quot;</span>: <span class="string">&quot;w+&quot;</span>,</span><br><span class="line">            <span class="string">&quot;maxBytes&quot;</span>: <span class="number">1024</span> * <span class="number">1024</span> * <span class="number">5</span>,  <span class="comment"># 5 MB</span></span><br><span class="line">            <span class="string">&quot;backupCount&quot;</span>: <span class="number">20</span>,</span><br><span class="line">            <span class="string">&quot;encoding&quot;</span>: <span class="string">&quot;utf8&quot;</span>,</span><br><span class="line">        &#125;,</span><br><span class="line">    &#125;,</span><br><span class="line">    <span class="string">&quot;root&quot;</span>: &#123;</span><br><span class="line">        <span class="string">&quot;handlers&quot;</span>: [<span class="string">&quot;console&quot;</span>],</span><br><span class="line">        <span class="string">&quot;level&quot;</span>: <span class="string">&quot;INFO&quot;</span> <span class="keyword">if</span> DEBUG <span class="keyword">else</span> <span class="string">&quot;WARNING&quot;</span>,</span><br><span class="line">    &#125;,</span><br><span class="line">    <span class="string">&quot;loggers&quot;</span>: &#123;</span><br><span class="line">        logger_name: &#123;</span><br><span class="line">            <span class="string">&quot;handlers&quot;</span>: [<span class="string">&quot;console&quot;</span>, <span class="string">&quot;log_to_detail_file&quot;</span>],</span><br><span class="line">            <span class="string">&quot;level&quot;</span>: <span class="string">&quot;INFO&quot;</span>,</span><br><span class="line">            <span class="string">&quot;propagate&quot;</span>: <span class="literal">False</span>,</span><br><span class="line">        &#125;,</span><br><span class="line">    &#125;,</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">dictConfig(dict_config)</span><br><span class="line">log = logging.getLogger(logger_name)</span><br><span class="line"></span><br></pre></td></tr></table></figure>
