        <div class="article-entry post-inner-html hairline" itemprop="articleBody">
            <h1 id="Samba"><a href="#Samba" class="headerlink" title="Samba"></a>Samba</h1><h2 id="Linux-部署-samba-服务"><a href="#Linux-部署-samba-服务" class="headerlink" title="Linux 部署 samba 服务"></a>Linux 部署 samba 服务</h2><p><strong>安装</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo apt-fast install samba</span><br><span class="line">sudo apt-fast install smbclient</span><br></pre></td></tr></table></figure>

<p><strong>配置</strong></p>
<p><u>&#x2F;etc&#x2F;samba&#x2F;smb.conf</u></p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line">[Downloads]</span><br><span class="line">   # 我们要分享的文件夹路径</span><br><span class="line">   path = /home/wukaige/Downloads</span><br><span class="line">   # valid users = samba</span><br><span class="line">   # 是否允许浏览</span><br><span class="line">   browseable = yes</span><br><span class="line">   # 是否可写</span><br><span class="line">   writable = yes</span><br><span class="line">   # 是否允许匿名(guest)访问,等同于public</span><br><span class="line">   guest ok = yes</span><br><span class="line">   # 客户端上传文件的默认权限</span><br><span class="line">   create mask = 0777</span><br><span class="line">   # 客户端创建目录的默认权限</span><br><span class="line">   # 注意共享文件在系统本地的权限不能低于以上设置的共享权限。</span><br><span class="line">   directory mask = 0777</span><br></pre></td></tr></table></figure>

<p><strong>创建用户</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">sudo useradd samba</span><br><span class="line">sudo passwd samba</span><br><span class="line"></span><br><span class="line"><span class="comment"># Samba 使用单独的密码管理, 再配一遍密码</span></span><br><span class="line">sudo smbpasswd -a samba</span><br></pre></td></tr></table></figure>

<p><strong>启动服务</strong></p>
<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">sudo systemctl start smbd.service</span><br></pre></td></tr></table></figure>

<p>‍</p>
